workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    integrations:
      app_store_connect: Tim Sørensen
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: dk.fcskanderborg.spillerstyring
      node: 22.0.0
      xcode: latest
    scripts:
      - name: Install dependencies
        script: |
          npm install
          npm install -g @capacitor/cli @capacitor/ios
      - name: Capacitor sync
        script: |
          npx cap sync ios
      - name: Set app display name
        script: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName Q-Fodboldstyring" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleName Q-Fodboldstyring" ios/App/App/Info.plist
      - name: Set build number
        script: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion 46" ios/App/App/Info.plist
      - name: Build iOS
        script: |
          xcode-project use-profiles
          xcode-project build-ipa \
            --project "ios/App/App.xcodeproj" \
            --scheme "App"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
